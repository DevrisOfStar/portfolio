name = "portfolio-api"
main = "src/index.ts"
compatibility_date = "2024-12-31"

# 기본 설정 (로컬 개발용)
[[d1_databases]]
binding = "DB"
database_name = "portfolio-data"
database_id = "DEV_DB_ID"  # 로컬 개발 시 사용

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "portfolio-images"  # 공용 R2 bucket

# 프로덕션 환경 설정
[env.production]
name = "portfolio-api"

[[env.production.d1_databases]]
binding = "DB"
database_name = "portfolio-data"
database_id = "PROD_DB_ID"  # GitHub Actions에서 실제 값으로 교체됨

[[env.production.r2_buckets]]
binding = "IMAGES"
bucket_name = "portfolio-images"

# 개발 환경 설정
[env.development]
name = "portfolio-api-dev"

[[env.development.d1_databases]]
binding = "DB"
database_name = "portfolio-data"
database_id = "DEV_DB_ID"

[[env.development.r2_buckets]]
binding = "IMAGES"
bucket_name = "portfolio-images"
